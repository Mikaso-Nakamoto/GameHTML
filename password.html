<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Password</title>
    <style>
      body {
        text-align: center;
      }
      .PLS {
        display: none;
      }
    </style>
  </head>
  <body>
    <h1>Enter Password</h1>

    <input type="password" id="pass" placeholder="Пароль" />
    <button onclick="check()" id="bot" class="buttomT">Подтвердить</button>
    <button class="PLS" id="PLS" onclick="More()"></button>
    <p id="msg"></p>

    <script>
      let attempts = 0;
      const correctPassword = "VPlofor";

      function check() {
        const input = document.getElementById("pass");
        const msg = document.getElementById("msg");
        const Button1 = document.getElementById("bot");
        const Button2 = document.getElementById("PLS");

        if (input.value === "") {
          msg.style.color = "red";
          msg.textContent = "Пустой пароль? Серьёзно?";
          return;
        }

        attempts++;

        if (attempts < 6) {
          const messages = [
            "Ошибка! Пароль должен быть введён задом наперёд.",
            "Не то. Нужно вводить стоя на одной ноге.",
            "Система сегодня в плохом настроении.",
            "Пароль слишком скучный. Добавь в него больше абсурда!",
            "Ошибка 404: Пароль потерялся в другой вселенной.",
          ];

          msg.style.color = "red";
          msg.textContent = messages[attempts - 1];

          input.value = "";
        } else {
          if (input.value === correctPassword) {
            msg.style.color = "green";
            msg.textContent = " Пароль верный! Добро пожаловать!";
          } else {
            msg.style.color = "red";
            msg.textContent = `Даже на ${attempts}-й раз неправильно...`;
            input.value = "";
          }
        }
        if (attempts === 7 && input.value === correctPassword) {
          msg.style.color = "green";
          msg.textContent = `Ура! Ты справился на ${attempts}-й попытке!`;
        } else if (attempts === 7) {
          msg.style.color = "#aa0012";
          msg.textContent = `Уже ${attempts} попыток, а пароль всё не верный!`;
        }
        if (attempts === 8 && input.value === correctPassword) {
          msg.style.color = "green";
          msg.textContent = `Красава, ты это сделал. ${attempts}-й попытке, правда, но все же...`;
        } else if (attempts === 8) {
          msg.style.color = "#88000f";
          msg.textContent = `Уже ${attempts}-я. Стоит ли оно того? `;
        } else if (attempts === 9 && input.value === correctPassword) {
          msg.style.color = "green";
          msg.textContent = `${attempts}-я попытка, Наконец-то!`;
        } else if (attempts === 9) {
          msg.style.color = "#77000d";
          msg.textContent = `Уже ${attempts} попыток... Цель оправдывает средства?`;
        }
        if (attempts === 10) {
          if (input.value === correctPassword) {
            msg.style.color = "green";
            msg.textContent = `Ты сделал это! ${attempts}-я попытка, но ты справился!`;
          } else {
            msg.style.color = "#330005";
            msg.textContent = `Мои соболезнования. ${attempts}-я попытка ока@#$57d6f7g879hj$%^IYN./I*(&*%B 4){oiOP";g567h8j9k0-9-0-9-0-9-0-9-0-9}`;
            input.disabled = true;
            input.placeholder = ";%::?:@#$YUHnbDWVVU&*)(O)";
            Button1.disabled = true;
            Button1.textContent = "#$%^&RUUN(*&4)";
            Button2.style.display = "inline-block";
            Button2.textContent = "Еще шанс";
          }
        }
        if (attempts === 11) {
          msg.style.color = "#110002";
          msg.textContent = `Ты меня достал. RUNRUNRUNRUN6f7g879hj$%^IYN./I*(&*%B 4){oiOP";g567h8j9k0-9-0-9-0-9-0-9-0-9}`;
          input.disabled = true;
          input.placeholder = ";%::?:@#$YUHRUNWVVU&*)(O)";
          Button1.disabled = true;
          Button1.textContent = "RUN";
        }
      }
      function More() {
        const Button2 = document.getElementById("PLS");
        const Button1 = document.getElementById("bot");
        const input = document.getElementById("pass");
        const msg = document.getElementById("msg");

        Button2.style.display = "none";

        msg.style.color = "#cc0000";
        msg.textContent = "Ладно, это последний шанс...";

        input.disabled = false;
        input.value = "";
        input.placeholder = "Пароль";

        Button1.disabled = false;
        Button1.textContent = "Подтвердить";

        attempts = 10;
      }
    </script>
  </body>
</html>
